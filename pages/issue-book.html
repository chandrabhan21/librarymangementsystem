<!DOCTYPE html>
<html>
<head>
  <title>Issue Book</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="navbar">
  <h2>Issue Book</h2>
  <div class="nav-links">
    <a href="search-book.html">Back</a>
  </div>
</div>

<div class="container">
  <div class="card">

    <form id="issueForm">

      <div class="form-group">
        <label>Book Name *</label>
        <input type="text" id="bookName" required>
      </div>

      <div class="form-group">
        <label>Author</label>
        <input type="text" id="authorName" readonly>
      </div>

      <div class="form-group">
        <label>Issue Date *</label>
        <input type="date" id="issueDate">
      </div>

      <div class="form-group">
        <label>Return Date *</label>
        <input type="date" id="returnDate">
      </div>

      <div class="form-group">
        <label>Remarks</label>
        <textarea id="remarks"></textarea>
      </div>

      <button class="btn" type="submit">Confirm Issue</button>
      <div class="error" id="issueError"></div>
      <div class="success" id="issueSuccess"></div>

    </form>

  </div>
</div>

<script>
const today = new Date().toISOString().split("T")[0];
document.getElementById("issueDate").setAttribute("min", today);
document.getElementById("issueDate").value = today;

// auto author mock
document.getElementById("bookName").addEventListener("blur", () => {
  const book = document.getElementById("bookName").value.trim();
  if (book) {
    document.getElementById("authorName").value = "Auto Author";
  }
});

// auto return date (+15 days)
function setReturnDate() {
  const issue = new Date(document.getElementById("issueDate").value);
  if (!issue) return;
  issue.setDate(issue.getDate() + 15);
  document.getElementById("returnDate").value =
    issue.toISOString().split("T")[0];
}
setReturnDate();
document.getElementById("issueDate").addEventListener("change", setReturnDate);

// validation
document.getElementById("issueForm").addEventListener("submit", function(e){
  e.preventDefault();

  const book = document.getElementById("bookName").value.trim();
  const issueDate = document.getElementById("issueDate").value;
  const returnDate = document.getElementById("returnDate").value;

  document.getElementById("issueError").innerText = "";
  document.getElementById("issueSuccess").innerText = "";

  if(!book || !issueDate || !returnDate){
    document.getElementById("issueError").innerText =
      "Please fill all mandatory fields";
    return;
  }

  // check return date ≤ 15 days
  const issue = new Date(issueDate);
  const maxReturn = new Date(issue);
  maxReturn.setDate(maxReturn.getDate() + 15);

  if(new Date(returnDate) > maxReturn){
    document.getElementById("issueError").innerText =
      "Return date cannot exceed 15 days";
    return;
  }

  document.getElementById("issueSuccess").innerText =
    "Book issued successfully!";
});
</script>

</body>
</html>
